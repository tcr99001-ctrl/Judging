name: Wipe and Install (Any Zip)

on:
  push:
    paths:
      - '**/*.zip'

jobs:
  wipe-and-install:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Wipe Old Files & Unzip New (Robust)
        shell: bash
        run: |
          set -euo pipefail

          echo "----- find zips (pre) -----"
          find . -maxdepth 6 -type f -name "*.zip" -print || true
          echo "---------------------------"

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          ZIP_FILE="$(git diff --name-only "$BEFORE" "$AFTER" | grep -E '\.zip$' | head -n 1 || true)"

          if [ -z "$ZIP_FILE" ]; then
            ZIP_FILE="$(find . -maxdepth 6 -type f -name "*.zip" | head -n 1 || true)"
          fi

          if [ -z "$ZIP_FILE" ] || [ ! -f "$ZIP_FILE" ]; then
            echo "❌ zip 파일을 찾을 수 없습니다: $ZIP_FILE"
            exit 1
          fi

          echo "🚨 적용할 ZIP: $ZIP_FILE"

          mkdir -p __zip_staging__
          cp "$ZIP_FILE" "__zip_staging__/payload.zip"
          echo "✅ zip staged: __zip_staging__/payload.zip"

          echo "🧹 wipe..."
          find . -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            ! -name '__zip_staging__' \
            ! -name '.' \
            -exec rm -rf {} +

          echo "📦 unzip..."
          mkdir -p temp_unzip
          unzip -q -o "__zip_staging__/payload.zip" -d temp_unzip

          # ✅ 핵심: zip 내부에 .github가 있으면 제거해서 충돌 방지
          rm -rf temp_unzip/.github || true

          COUNT=$(ls -1 temp_unzip | wc -l | tr -d ' ')
          FIRST_ITEM=$(ls -1 temp_unzip | head -n 1)

          shopt -s dotglob
          if [ "$COUNT" -eq 1 ] && [ -d "temp_unzip/$FIRST_ITEM" ]; then
            echo "📂 nested folder flatten: $FIRST_ITEM"
            # nested 안에도 .github가 있을 수 있으니 또 제거
            rm -rf "temp_unzip/$FIRST_ITEM/.github" || true
            mv temp_unzip/"$FIRST_ITEM"/* .
          else
            echo "📄 direct files move"
            mv temp_unzip/* .
          fi
          shopt -u dotglob

          rm -rf temp_unzip __zip_staging__
          echo "✨ 배치 완료."
          ls -la

      - name: Commit and Push
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          git add -A

          if [ -z "$(git status --porcelain)" ]; then
            echo "변경사항이 없습니다."
            exit 0
          fi

          git commit -m "Reset & Update: zip applied"

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "✅ 성공적으로 교체되었습니다."
